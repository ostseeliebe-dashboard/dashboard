# .github/workflows/daily-update.yml
#
# Taeglich um 08:00 Uhr MESZ (= 06:00 UTC):
# 1. Buchungs-CSV aus Contao herunterladen
# 2. Dashboard neu generieren (gen_dash.py)
#    (inkl. Apartmenthaus-Tab - direkt integriert)
# 3. Geaenderte HTML-Dateien committen und pushen
#
# Benoetigte GitHub Secrets (Settings -> Secrets -> Actions):
#   CONTAO_URL  https://www.ostseeliebe-ferienwohnungen.de
#   CONTAO_USER Contao-Benutzername
#   CONTAO_PASS Contao-Passwort

name: Taegliches Dashboard-Update

on:
  schedule:
    - cron: "0 6 * * *"  # taeglich 08:00 Uhr MESZ (= 06:00 UTC)
  workflow_dispatch:      # manueller Start ueber GitHub-Oberflaeche

permissions:
  contents: write  # zum Committen noetig

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      # -- 1. Repo auschecken --
      - name: Checkout
        uses: actions/checkout@v4

      # -- 2. Python einrichten --
      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -- 3. Abhaengigkeiten installieren --
      - name: Abhaengigkeiten installieren
        run: pip install requests pandas openpyxl beautifulsoup4

      # -- 4. Buchungsdaten aus Contao herunterladen --
      - name: Buchungsdaten aus Contao herunterladen
        env:
          CONTAO_URL:  ${{ secrets.CONTAO_URL }}
          CONTAO_USER: ${{ secrets.CONTAO_USER }}
          CONTAO_PASS: ${{ secrets.CONTAO_PASS }}
        run: |
          python fetch_contao_data.py \
            --from 01.01.2017 \
            --to $(date -d "+730 days" +%d.%m.%Y) \
            --out buchungen_export_2027.csv

      # -- 5. Objektstammdaten aus Contao laden --
      - name: Objektstammdaten aus Contao laden
        env:
          CONTAO_URL:  ${{ secrets.CONTAO_URL }}
          CONTAO_USER: ${{ secrets.CONTAO_USER }}
          CONTAO_PASS: ${{ secrets.CONTAO_PASS }}
        run: |
          python fetch_property_data.py --out Objektstammdaten.xlsx
        continue-on-error: true  # Dashboard funktioniert auch ohne (nur ohne Stammdaten)

      # -- 6. Dashboard generieren (inkl. Apartmenthaus-Tab) --
      - name: Dashboard generieren (gen_dash.py)
        run: python gen_dash.py

      # -- 7. Passwortschutz anwenden --
      - name: Passwortschutz anwenden (protect_dashboard.py)
        run: python protect_dashboard.py
        continue-on-error: true

      # -- 8. Committen und pushen --
      - name: Aenderungen committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Nur committen wenn es wirklich Aenderungen gibt
          git diff --cached --quiet || \
            git commit -m "Automatisches Update $(date +'%d.%m.%Y %H:%M')"

      - name: Aenderungen pushen
        run: git push
